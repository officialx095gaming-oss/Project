<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal AI Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
darkMode: 'class'
}
</script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{font-family:system-ui,Arial}
#messages pre{background:#111;color:#eee;padding:12px;border-radius:8px;overflow:auto}
#messages code{background:#eee;padding:2px 4px;border-radius:4px}
.dark #messages code{background:#333}
</style>
</head>

<body class="bg-gray-50 dark:bg-gray-900">

<div id="loading" class="fixed inset-0 flex items-center justify-center text-lg">
Loading App...
</div>

<div id="app" class="hidden flex min-h-screen">

<!-- Sidebar -->
<div id="sidebar" class="w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col fixed md:relative z-30 h-full transform -translate-x-full md:translate-x-0 transition">

<div class="p-4 flex justify-between items-center border-b dark:border-gray-700">
<span class="font-semibold">Chats</span>
<button id="closeSidebar" class="md:hidden">✕</button>
</div>

<button id="newChat" class="m-3 bg-blue-500 text-white rounded p-2">New Chat</button>

<div id="chatList" class="flex-1 overflow-y-auto"></div>

<div class="p-3 border-t dark:border-gray-700 flex gap-2">
<button id="settingsBtn" class="text-sm">⚙</button>
<button id="darkBtn" class="text-sm">🌙</button>
</div>

</div>

<!-- Main -->
<div class="flex flex-col flex-1 min-h-screen">

<!-- Top bar -->
<div class="p-3 border-b bg-white dark:bg-gray-800 flex items-center gap-3">
<button id="menuBtn" class="md:hidden">☰</button>
<h1 class="font-semibold">Universal AI</h1>
</div>

<!-- Messages -->
<div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

<!-- Input -->
<div class="border-t bg-white dark:bg-gray-800 p-3 sticky bottom-0">
<div class="flex gap-2">
<textarea id="input" rows="1" class="flex-1 border rounded p-2 resize-none dark:bg-gray-700"></textarea>
<button id="send" class="bg-blue-500 text-white px-4 rounded">Send</button>
</div>
</div>

</div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white dark:bg-gray-800 p-6 rounded w-96 space-y-4">

<h2 class="font-semibold">Settings</h2>

<input id="apiKey" type="password" placeholder="OpenRouter API Key" class="w-full border p-2 rounded dark:bg-gray-700">

<input id="modelName" placeholder="Model name" class="w-full border p-2 rounded dark:bg-gray-700">

<textarea id="systemPrompt" placeholder="System Prompt" class="w-full border p-2 rounded dark:bg-gray-700"></textarea>

<div class="flex justify-end gap-2">
<button id="saveSettings" class="bg-blue-500 text-white px-3 py-1 rounded">Save</button>
<button id="closeSettings">Cancel</button>
</div>

</div>
</div>

<script>

document.getElementById("loading").style.display="none"
document.getElementById("app").classList.remove("hidden")

const sidebar=document.getElementById("sidebar")
const menuBtn=document.getElementById("menuBtn")
const closeSidebar=document.getElementById("closeSidebar")
const newChatBtn=document.getElementById("newChat")
const chatList=document.getElementById("chatList")
const messagesDiv=document.getElementById("messages")
const input=document.getElementById("input")
const sendBtn=document.getElementById("send")

const settingsBtn=document.getElementById("settingsBtn")
const settingsModal=document.getElementById("settingsModal")
const saveSettings=document.getElementById("saveSettings")
const closeSettings=document.getElementById("closeSettings")

const apiKeyInput=document.getElementById("apiKey")
const modelInput=document.getElementById("modelName")
const systemPromptInput=document.getElementById("systemPrompt")

const darkBtn=document.getElementById("darkBtn")

let chats=JSON.parse(localStorage.getItem("chats")||"[]")
let currentChat=null

function saveChats(){
localStorage.setItem("chats",JSON.stringify(chats))
}

function renderChats(){

chatList.innerHTML=""

chats.forEach((chat,i)=>{

const item=document.createElement("div")
item.className="p-3 border-b flex justify-between items-center cursor-pointer"

const title=document.createElement("span")
title.textContent=chat.title

title.onclick=()=>openChat(i)

const menu=document.createElement("div")

const del=document.createElement("button")
del.textContent="🗑"
del.onclick=(e)=>{
e.stopPropagation()
chats.splice(i,1)
saveChats()
renderChats()
}

const ren=document.createElement("button")
ren.textContent="✏"
ren.onclick=(e)=>{
e.stopPropagation()
const name=prompt("Rename chat",chat.title)
if(name){chat.title=name;saveChats();renderChats()}
}

menu.appendChild(ren)
menu.appendChild(del)

item.appendChild(title)
item.appendChild(menu)

chatList.appendChild(item)

})

}

function newChat(){

const chat={
title:"New Chat",
messages:[],
system:systemPromptInput.value||""
}

chats.push(chat)
saveChats()
renderChats()
openChat(chats.length-1)

}

function openChat(i){

currentChat=i
messagesDiv.innerHTML=""

chats[i].messages.forEach(m=>{
addMessage(m.role,m.content)
})

}

function addMessage(role,text){

const div=document.createElement("div")
div.className=role==="user"?"text-right":"text-left"

const bubble=document.createElement("div")
bubble.className="inline-block p-3 rounded max-w-xl"

if(role==="user") bubble.classList.add("bg-blue-500","text-white")
else bubble.classList.add("bg-gray-200","dark:bg-gray-700")

bubble.innerHTML=marked.parse(text)

div.appendChild(bubble)

messagesDiv.appendChild(div)

messagesDiv.scrollTop=messagesDiv.scrollHeight

return bubble

}

async function sendMessage(){

if(currentChat===null)newChat()

const text=input.value.trim()
if(!text)return

input.value=""

const chat=chats[currentChat]

chat.messages.push({role:"user",content:text})

addMessage("user",text)

const aiBubble=addMessage("assistant","")

chat.messages.push({role:"assistant",content:""})

saveChats()

await streamResponse(chat,aiBubble)

}

async function streamResponse(chat,bubble){

const apiKey=localStorage.getItem("openrouter_key")
const model=localStorage.getItem("openrouter_model")||"deepseek/deepseek-r1:free"

if(!apiKey){
alert("Add API key in settings")
return
}

const msgs=[]

if(chat.system)msgs.push({role:"system",content:chat.system})

chat.messages.forEach(m=>{
msgs.push({role:m.role,content:m.content})
})

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},

body:JSON.stringify({
model:model,
messages:msgs,
stream:true
})

})

const reader=res.body.getReader()
const decoder=new TextDecoder()

let aiText=""

while(true){

const {done,value}=await reader.read()
if(done)break

const chunk=decoder.decode(value)

const lines=chunk.split("\n")

lines.forEach(line=>{

if(line.startsWith("data: ")){

const data=line.replace("data: ","")

if(data==="[DONE]")return

try{

const json=JSON.parse(data)

const token=json.choices[0].delta?.content

if(token){

aiText+=token
bubble.innerHTML=marked.parse(aiText)

messagesDiv.scrollTop=messagesDiv.scrollHeight

}

}catch(e){}

}

})

}

chat.messages[chat.messages.length-1].content=aiText

saveChats()

}

sendBtn.onclick=sendMessage

input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
sendMessage()
}
})

newChatBtn.onclick=newChat

menuBtn.onclick=()=>sidebar.classList.remove("-translate-x-full")

closeSidebar.onclick=()=>sidebar.classList.add("-translate-x-full")

settingsBtn.onclick=()=>{

settingsModal.classList.remove("hidden")
settingsModal.classList.add("flex")

apiKeyInput.value=localStorage.getItem("openrouter_key")||""
modelInput.value=localStorage.getItem("openrouter_model")||"deepseek/deepseek-r1:free"

}

closeSettings.onclick=()=>settingsModal.classList.add("hidden")

saveSettings.onclick=()=>{

localStorage.setItem("openrouter_key",apiKeyInput.value)
localStorage.setItem("openrouter_model",modelInput.value)

settingsModal.classList.add("hidden")

}

darkBtn.onclick=()=>{

document.documentElement.classList.toggle("dark")

localStorage.setItem("darkmode",
document.documentElement.classList.contains("dark"))

}

if(localStorage.getItem("darkmode")==="true"){
document.documentElement.classList.add("dark")
}

renderChats()

</script>

</body>
</html>
