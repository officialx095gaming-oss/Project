<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-sidebar { backdrop-filter: blur(10px); background-color: rgba(255, 255, 255, 0.8); }
        .dark .glass-sidebar { background-color: rgba(31, 41, 55, 0.9); }
        .message-bubble pre { background: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        .dark .message-bubble pre { background: #374151; }
        .typing-cursor::after { content: '▋'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        /* Mobile safe height fix */
        .app-container { min-height: 100vh; min-height: -webkit-fill-available; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: white; z-index: 9999; }
        .dark #loading { background: #111827; color: white; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">

    <div id="loading">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-medium">Initializing Systems...</p>
        </div>
    </div>

    <div class="app-container">
        <header class="lg:hidden flex items-center justify-between p-4 border-b dark:border-gray-700 bg-white dark:bg-gray-800 sticky top-0 z-30">
            <button id="mobileMenuBtn" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                <svg class="w-6 h-6 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <h1 class="font-semibold dark:text-white">Gemini Clone</h1>
            <button onclick="toggleDarkMode()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                <svg class="w-5 h-5 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </header>

        <div class="flex flex-1 overflow-hidden relative">
            <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 lg:static lg:block w-72 glass-sidebar border-r dark:border-gray-700 z-40 transition-transform duration-300 ease-in-out">
                <div class="flex flex-col h-full p-4">
                    <button onclick="createNewChat()" class="flex items-center justify-center gap-2 w-full p-3 mb-6 bg-white dark:bg-gray-800 border dark:border-gray-600 rounded-2xl shadow-sm hover:shadow-md transition-all dark:text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        <span class="font-medium">New Chat</span>
                    </button>
                    
                    <div id="chatHistory" class="flex-1 overflow-y-auto space-y-2 mb-4">
                        </div>

                    <div class="pt-4 border-t dark:border-gray-700 space-y-2">
                        <button onclick="openSettings()" class="flex items-center gap-3 w-full p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg dark:text-white">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            Settings
                        </button>
                        <button onclick="toggleDarkMode()" class="hidden lg:flex items-center gap-3 w-full p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg dark:text-white">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                            Theme
                        </button>
                    </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-gray-900 relative">
                <div id="messageList" class="chat-container px-4 py-8 lg:px-24 space-y-6">
                    <div id="welcome" class="h-full flex flex-col items-center justify-center text-center space-y-4 pt-20">
                        <div class="w-16 h-16 bg-blue-500 rounded-full flex items-center justify-center text-white text-2xl font-bold">G</div>
                        <h2 class="text-3xl font-semibold dark:text-white">How can I help you today?</h2>
                        <p class="text-gray-500 dark:text-gray-400 max-w-md">Connect your OpenRouter API key in settings to start chatting.</p>
                    </div>
                </div>

                <div class="absolute bottom-0 left-0 right-0 p-4 lg:px-24 bg-gradient-to-t from-white dark:from-gray-900 via-white dark:via-gray-900 to-transparent">
                    <div class="max-w-4xl mx-auto relative group">
                        <textarea id="userInput" 
                            rows="1"
                            placeholder="Message Gemini..."
                            class="w-full p-4 pr-14 rounded-2xl border dark:border-gray-600 bg-gray-50 dark:bg-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all resize-none shadow-sm"
                            oninput="autoResize(this)"></textarea>
                        <button id="sendBtn" onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-50 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                    </div>
                    <p class="text-center text-xs text-gray-400 mt-2">Gemini may display inaccurate info, including about people.</p>
                </div>
            </main>
        </div>

        <div id="settingsModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-6 shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold dark:text-white">Settings</h3>
                    <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400">✕</button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">OpenRouter API Key</label>
                        <input type="password" id="apiKey" class="w-full p-2 border dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">Model</label>
                        <input type="text" id="modelName" placeholder="deepseek/deepseek-r1:free" class="w-full p-2 border dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 dark:text-gray-300">System Prompt</label>
                        <textarea id="systemPrompt" rows="3" class="w-full p-2 border dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 dark:text-white"></textarea>
                    </div>
                </div>

                <div class="mt-8">
                    <button onclick="saveSettings()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition-colors">Save & Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let state = {
            chats: [],
            activeChatId: null,
            settings: {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are a helpful AI assistant.',
                darkMode: false
            }
        };

        // --- Initialization ---
        function init() {
            const savedState = localStorage.getItem('dks_chat_app_v1');
            if (savedState) {
                const parsed = JSON.parse(savedState);
                state = { ...state, ...parsed };
            }

            // Apply Theme
            if (state.settings.darkMode) document.documentElement.classList.add('dark');
            
            // Sync Settings UI
            document.getElementById('apiKey').value = state.settings.apiKey;
            document.getElementById('modelName').value = state.settings.model;
            document.getElementById('systemPrompt').value = state.settings.systemPrompt;

            renderSidebar();
            if (state.activeChatId) {
                loadChat(state.activeChatId);
            }

            // Hide Loader
            document.getElementById('loading').style.display = 'none';
        }

        // --- Core Functions ---
        function saveState() {
            localStorage.setItem('dks_chat_app_v1', JSON.stringify(state));
        }

        function createNewChat() {
            const id = Date.now().toString();
            const newChat = {
                id,
                title: 'New Chat',
                messages: []
            };
            state.chats.unshift(newChat);
            state.activeChatId = id;
            saveState();
            renderSidebar();
            loadChat(id);
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function loadChat(id) {
            state.activeChatId = id;
            const chat = state.chats.find(c => c.id === id);
            const list = document.getElementById('messageList');
            const welcome = document.getElementById('welcome');

            if (!chat || chat.messages.length === 0) {
                list.innerHTML = ''; 
                list.appendChild(welcome);
                welcome.classList.remove('hidden');
            } else {
                welcome.classList.add('hidden');
                list.innerHTML = chat.messages.map(msg => renderMessageHTML(msg.role, msg.content)).join('');
                list.scrollTop = list.scrollHeight;
            }
            renderSidebar();
        }

        function renderMessageHTML(role, content) {
            const isUser = role === 'user';
            return `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'} animate-fadeIn">
                    <div class="max-w-[85%] lg:max-w-[70%] message-bubble">
                        <div class="p-4 rounded-2xl ${isUser ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-gray-100 dark:bg-gray-800 dark:text-gray-100 rounded-tl-none'}">
                            <div class="prose dark:prose-invert max-w-none text-sm lg:text-base">
                                ${isUser ? content : marked.parse(content)}
                            </div>
                        </div>
                        <div class="text-[10px] mt-1 text-gray-400 px-2 uppercase tracking-widest">${role}</div>
                    </div>
                </div>
            `;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const content = input.value.trim();
            if (!content || !state.settings.apiKey) {
                if (!state.settings.apiKey) openSettings();
                return;
            }

            if (!state.activeChatId) {
                createNewChat();
            }

            // Update UI for User Message
            const chat = state.chats.find(c => c.id === state.activeChatId);
            chat.messages.push({ role: 'user', content });
            if (chat.title === 'New Chat') chat.title = content.substring(0, 30) + '...';
            
            input.value = '';
            autoResize(input);
            loadChat(state.activeChatId);

            // Setup AI placeholder
            const list = document.getElementById('messageList');
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'flex justify-start animate-fadeIn';
            aiMsgDiv.innerHTML = `
                <div class="max-w-[85%] lg:max-w-[70%] message-bubble">
                    <div class="p-4 rounded-2xl bg-gray-100 dark:bg-gray-800 dark:text-gray-100 rounded-tl-none">
                        <div id="streamingText" class="prose dark:prose-invert max-w-none text-sm lg:text-base typing-cursor"></div>
                    </div>
                </div>
            `;
            list.appendChild(aiMsgDiv);
            list.scrollTop = list.scrollHeight;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.settings.apiKey}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Gemini Clone',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: state.settings.model,
                        messages: [
                            { role: 'system', content: state.settings.systemPrompt },
                            ...chat.messages
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullAiResponse = '';
                const streamContainer = aiMsgDiv.querySelector('#streamingText');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;
                            try {
                                const json = JSON.parse(data);
                                const text = json.choices[0]?.delta?.content || '';
                                fullAiResponse += text;
                                streamContainer.innerHTML = marked.parse(fullAiResponse);
                                list.scrollTop = list.scrollHeight;
                            } catch (e) {}
                        }
                    }
                }

                streamContainer.classList.remove('typing-cursor');
                chat.messages.push({ role: 'assistant', content: fullAiResponse });
                saveState();
                renderSidebar();

            } catch (error) {
                console.error(error);
                aiMsgDiv.innerHTML = `<div class="text-red-500 p-4">Error: Failed to connect to API. Check your key and network.</div>`;
            }
        }

        // --- UI Logic ---
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function renderSidebar() {
            const history = document.getElementById('chatHistory');
            history.innerHTML = state.chats.map(chat => `
                <div class="group relative flex items-center p-2 rounded-xl cursor-pointer transition-colors ${state.activeChatId === chat.id ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'hover:bg-gray-100 dark:hover:bg-gray-800 dark:text-gray-300'}">
                    <div class="flex-1 truncate pr-8" onclick="loadChat('${chat.id}')">
                        ${chat.title}
                    </div>
                    <button onclick="deleteChat('${chat.id}')" class="absolute right-2 opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition-opacity">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        function deleteChat(id) {
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.activeChatId === id) state.activeChatId = null;
            saveState();
            renderSidebar();
            init(); // Re-refresh UI
        }

        function toggleDarkMode() {
            state.settings.darkMode = !state.settings.darkMode;
            document.documentElement.classList.toggle('dark');
            saveState();
        }

        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

        function saveSettings() {
            state.settings.apiKey = document.getElementById('apiKey').value;
            state.settings.model = document.getElementById('modelName').value || 'deepseek/deepseek-r1:free';
            state.settings.systemPrompt = document.getElementById('systemPrompt').value;
            saveState();
            closeSettings();
        }

        // --- Event Listeners ---
        document.getElementById('mobileMenuBtn').onclick = toggleSidebar;
        document.getElementById('userInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Start the app
        init();
    </script>
</body>
</html>
